<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Pro Ultra</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--primary:#4f46e5;
--bg:#f8fafc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--red:#ef4444;
--green:#10b981;
--border:#e2e8f0;
}

[data-theme="dark"]{
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--border:#334155;
}

body{
font-family:-apple-system;
background:var(--bg);
color:var(--text);
margin:0;
padding-bottom:90px;
}

.card{
background:var(--card);
border-radius:18px;
padding:18px;
margin:15px;
border:1px solid var(--border);
}

.title{
font-size:13px;
color:var(--muted);
margin-bottom:6px;
}

.big{
font-size:36px;
font-weight:800;
}

input,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid var(--border);
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
background:var(--primary);
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
}

.tx{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid var(--border);
animation:pop .25s ease;
}

@keyframes pop{
from{opacity:0;transform:scale(.95)}
to{opacity:1;transform:scale(1)}
}

.progress-bar{
height:8px;
background:var(--border);
border-radius:4px;
overflow:hidden;
margin-top:5px;
}

.progress-fill{
height:100%;
background:var(--primary);
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:var(--card);
padding:15px;
border-top:1px solid var(--border);
}

.nav{cursor:pointer;text-align:center}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>
</head>

<body>

<div class="card">
<div class="title">יתרה</div>
<div class="big" id="bal">₪0</div>
</div>

<div class="card">
<div class="title">תחזית סוף חודש</div>
<div class="big" id="forecast">₪0</div>
</div>

<div class="card">
<div class="title">ניתוח פיננסי</div>
<div id="analysis"></div>
</div>

<div class="card">
<div class="title">הוצאות לפי קטגוריה</div>
<canvas id="catChart"></canvas>
</div>

<div class="card">
<div class="title">מגמה חודשית</div>
<canvas id="trendChart"></canvas>
</div>

<div class="card">
<div class="title">תקציב לפי קטגוריה</div>
<div id="catBudget"></div>
</div>

<div class="card">
<div class="title">סטטיסטיקות חודשיות</div>
<div id="stats" class="grid"></div>
</div>

<div class="card">
<input id="search" placeholder="חיפוש..." oninput="render()">
<select id="filter" onchange="render()">
<option value="all">הכל</option>
<option value="in">הכנסות</option>
<option value="out">הוצאות</option>
</select>
</div>

<div class="card">
<div id="list"></div>
</div>

<div class="bottom">
<div class="nav" onclick="toggleAdd()">➕</div>
<div class="nav" onclick="toggleTheme()">🌓</div>
<div class="nav" onclick="exportCSV()">📊</div>
</div>

<div id="addBox" style="display:none" class="card">

<input id="amt" type="number" placeholder="סכום">

<input id="note" placeholder="תיאור">

<select id="type">
<option value="out">הוצאה</option>
<option value="in">הכנסה</option>
</select>

<button onclick="addTx()">שמור</button>

</div>

<script>

let db=JSON.parse(localStorage.getItem("db"))||[]

let budgets={
"סופר":1500,
"רכב":700,
"פנאי":600,
"חשבונות":1200,
"שונות":400
}

let catIcons={
"סופר":"🛒",
"רכב":"🚗",
"פנאי":"🍔",
"משכורת":"💰",
"שונות":"✨"
}

function autoCat(text){

text=text.toLowerCase()

if(text.includes("סופר"))return"סופר"
if(text.includes("דלק"))return"רכב"
if(text.includes("מסעדה"))return"פנאי"
if(text.includes("משכורת"))return"משכורת"

return"שונות"

}

function addTx(){

let amt=parseFloat(document.getElementById("amt").value)

let note=document.getElementById("note").value

let type=document.getElementById("type").value

if(!amt||!note)return

let cat=autoCat(note)

db.push({
id:Date.now(),
amt,
note,
type,
cat
})

localStorage.setItem("db",JSON.stringify(db))

document.getElementById("amt").value=""
document.getElementById("note").value=""

render()

}

function render(){

let list=document.getElementById("list")

list.innerHTML=""

let total=0

let search=document.getElementById("search").value.toLowerCase()

let filter=document.getElementById("filter").value

let catData={}
let monthData={}

let inMonth=0
let outMonth=0

let month=new Date().getMonth()

db.slice().reverse().forEach(t=>{

if(search && !t.note.toLowerCase().includes(search))return
if(filter!="all" && filter!=t.type)return

let val=t.type=="in"?t.amt:-t.amt

total+=val

let tMonth=new Date(t.id).getMonth()

if(tMonth===month){

if(t.type=="in")inMonth+=t.amt
else{
outMonth+=t.amt
catData[t.cat]=(catData[t.cat]||0)+t.amt
}

}

let m=tMonth+1

monthData[m]=(monthData[m]||0)+val

list.innerHTML+=`

<div class="tx">

<div>${catIcons[t.cat]||"🏷"} ${t.note}</div>

<div style="color:${t.type=="in"?"green":"red"}">
${t.type=="in"?"+":"-"}₪${t.amt}
</div>

</div>

`

})

document.getElementById("bal").innerText="₪"+total

drawCat(catData)

drawTrend(monthData)

forecast(inMonth,outMonth)

analysis(inMonth,outMonth,catData)

stats(inMonth,outMonth)

renderBudgets(catData)

}

function forecast(inMonth,outMonth){

let day=new Date().getDate()

let days=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate()

let avg=outMonth/day

let pred=avg*days

let val=inMonth-pred

document.getElementById("forecast").innerText="₪"+Math.round(val)

}

function analysis(inMonth,outMonth,catData){

let msg=[]

if(outMonth>inMonth)msg.push("⚠️ ההוצאות גבוהות מההכנסות")

let top=Object.keys(catData).sort((a,b)=>catData[b]-catData[a])[0]

if(top)msg.push("📊 ההוצאה הגדולה ביותר: "+top)

if(outMonth<inMonth*0.6)msg.push("💰 ניהול תקציב מצוין")

document.getElementById("analysis").innerHTML=msg.join("<br>")

}

function stats(inMonth,outMonth){

let balance=inMonth-outMonth

document.getElementById("stats").innerHTML=`

<div class="card"><div class="title">הכנסות</div><strong>₪${inMonth}</strong></div>

<div class="card"><div class="title">הוצאות</div><strong>₪${outMonth}</strong></div>

<div class="card"><div class="title">מאזן</div><strong>₪${balance}</strong></div>

<div class="card"><div class="title">חיסכון</div><strong>${Math.round((balance/inMonth)*100||0)}%</strong></div>

`

}

function renderBudgets(catData){

let box=document.getElementById("catBudget")

box.innerHTML=""

Object.keys(budgets).forEach(cat=>{

let spent=catData[cat]||0

let budget=budgets[cat]

let p=Math.min((spent/budget)*100,100)

box.innerHTML+=`

<div>

<div style="display:flex;justify-content:space-between;font-size:13px">

<span>${cat}</span>

<span>₪${spent}/₪${budget}</span>

</div>

<div class="progress-bar">

<div class="progress-fill" style="width:${p}%"></div>

</div>

</div>

`

})

}

let catChart

function drawCat(data){

if(catChart)catChart.destroy()

catChart=new Chart(
document.getElementById("catChart"),
{
type:"doughnut",
data:{
labels:Object.keys(data),
datasets:[{data:Object.values(data)}]
}
})

}

let trendChart

function drawTrend(data){

if(trendChart)trendChart.destroy()

trendChart=new Chart(
document.getElementById("trendChart"),
{
type:"bar",
data:{
labels:Object.keys(data),
datasets:[{
label:"מאזן חודשי",
data:Object.values(data)
}]
}
})

}

function toggleAdd(){

let box=document.getElementById("addBox")

box.style.display=box.style.display=="none"?"block":"none"

}

function toggleTheme(){

let dark=document.body.getAttribute("data-theme")=="dark"

document.body.setAttribute("data-theme",dark?"light":"dark")

}

function exportCSV(){

let csv="date,type,cat,note,amt\n"

db.forEach(t=>{

csv+=`${t.id},${t.type},${t.cat},${t.note},${t.amt}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="finance.csv"

a.click()

}

setInterval(()=>{
localStorage.setItem("backup",JSON.stringify(db))
},60000)

render()

</script>

</body>
</html>
