<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Finance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--primary:#3b5bdb;
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--green:#16a34a;
--red:#ef4444;
--border:#e2e8f0;
}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
padding-bottom:90px;
}

.header{
padding:20px;
background:linear-gradient(135deg,#3b5bdb,#6366f1);
color:white;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.balance{
font-size:34px;
font-weight:800;
margin-top:5px;
}

.row{
display:flex;
gap:10px;
margin-top:15px;
}

.smallCard{
flex:1;
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:12px;
font-size:13px;
}

.container{
padding:15px;
}

.card{
background:var(--card);
border-radius:18px;
padding:16px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.title{
font-size:13px;
color:var(--muted);
margin-bottom:8px;
}

.tx{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid var(--border);
}

.fab{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
background:var(--primary);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
cursor:pointer;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid var(--border);
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottomNav div{
text-align:center;
font-size:12px;
color:var(--muted);
}

input,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid var(--border);
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--primary);
color:white;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-radius:20px 20px 0 0;
padding:20px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);
}

.progress{
height:6px;
background:#e2e8f0;
border-radius:5px;
margin-top:5px;
}

.progress div{
height:100%;
background:var(--primary);
border-radius:5px;
}

</style>
</head>

<body>

<div class="header">

<div>יתרה כוללת</div>
<div class="balance" id="balance">₪0</div>

<div class="row">

<div class="smallCard">
הכנסות<br>
<strong id="income">₪0</strong>
</div>

<div class="smallCard">
הוצאות<br>
<strong id="expense">₪0</strong>
</div>

</div>

</div>

<div class="container">

<div class="card">
<div class="title">תחזית סוף חודש</div>
<strong id="forecast">₪0</strong>
</div>

<div class="card">
<div class="title">ניתוח פיננסי</div>
<div id="analysis"></div>
</div>

<div class="card">
<div class="title">הוצאות לפי קטגוריה</div>
<canvas id="catChart"></canvas>
</div>

<div class="card">
<div class="title">מגמת מאזן</div>
<canvas id="trendChart"></canvas>
</div>

<div class="card">

<input id="search" placeholder="חיפוש תנועה..." oninput="render()">

<div id="txList"></div>

</div>

</div>

<div class="fab" onclick="openAdd()">+</div>

<div class="bottomNav">

<div>🏠<br>בית</div>
<div>📊<br>דוחות</div>
<div onclick="exportCSV()">⬇<br>יצוא</div>

</div>

<div class="modal" id="addModal">

<input id="amount" type="number" placeholder="סכום">

<input id="note" placeholder="תיאור">

<select id="type">
<option value="out">הוצאה</option>
<option value="in">הכנסה</option>
</select>

<button onclick="addTx()">שמור</button>

</div>

<script>

let db = JSON.parse(localStorage.getItem("finance_db")) || []

let catChart
let trendChart

function openAdd(){
document.getElementById("addModal").style.display="block"
}

function addTx(){

let amt=parseFloat(amount.value)
let note=document.getElementById("note").value
let type=document.getElementById("type").value

if(!amt || !note) return

let cat="שונות"

if(note.includes("סופר")) cat="סופר"
if(note.includes("דלק")) cat="רכב"
if(note.includes("מסעדה")) cat="פנאי"

db.push({
id:Date.now(),
amt,
note,
type,
cat
})

localStorage.setItem("finance_db",JSON.stringify(db))

amount.value=""
note.value=""

render()

}

function render(){

let total=0
let income=0
let expense=0

let catData={}
let monthData={}

let search=document.getElementById("search").value.toLowerCase()

let list=document.getElementById("txList")
list.innerHTML=""

db.slice().reverse().forEach(t=>{

if(search && !t.note.toLowerCase().includes(search)) return

let val = t.type==="in"?t.amt:-t.amt

total+=val

if(t.type==="in") income+=t.amt
else{
expense+=t.amt
catData[t.cat]=(catData[t.cat]||0)+t.amt
}

let m=new Date(t.id).getMonth()+1
monthData[m]=(monthData[m]||0)+val

list.innerHTML+=`

<div class="tx">

<div>${t.note}</div>

<div style="color:${t.type==="in"?"green":"red"}">
${t.type==="in"?"+":"-"}₪${t.amt}
</div>

</div>

`

})

balance.innerText="₪"+total
income.innerText="₪"+income
expense.innerText="₪"+expense

forecast(income,expense)

analysis(income,expense,catData)

drawCat(catData)

drawTrend(monthData)

}

function forecast(income,expense){

let day=new Date().getDate()
let days=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate()

let avg=expense/day
let pred=avg*days

forecast.innerText="₪"+Math.round(income-pred)

}

function analysis(income,expense,catData){

let msg=[]

if(expense>income) msg.push("⚠️ ההוצאות גבוהות מההכנסות")

let top=Object.keys(catData).sort((a,b)=>catData[b]-catData[a])[0]

if(top) msg.push("📊 ההוצאה הגדולה ביותר: "+top)

analysis.innerHTML=msg.join("<br>")

}

function drawCat(data){

if(catChart) catChart.destroy()

catChart=new Chart(catChart,{
type:"doughnut",
data:{
labels:Object.keys(data),
datasets:[{data:Object.values(data)}]
}
})

}

function drawTrend(data){

if(trendChart) trendChart.destroy()

trendChart=new Chart(trendChart,{
type:"line",
data:{
labels:Object.keys(data),
datasets:[{
label:"מאזן",
data:Object.values(data)
}]
}
})

}

function exportCSV(){

let csv="date,type,note,amount\n"

db.forEach(t=>{
csv+=`${t.id},${t.type},${t.note},${t.amt}\n`
})

let blob=new Blob([csv])
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="finance.csv"

a.click()

}

render()

</script>

</body>
</html>
