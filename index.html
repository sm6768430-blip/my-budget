<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Master AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; 
            --text-sec: #94a3b8; --success: #10b981; --danger: #f43f5e; --border: #334155;
        }
        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* AI Cards Custom Style */
        .ai-card { background: linear-gradient(135deg, #312e81, #1e1b4b); border: 1px solid #4338ca; border-radius: 24px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .ai-card::after { content: "AI"; position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 800; }
        
        .card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .label { font-size: 13px; color: var(--text-sec); font-weight: 500; margin-bottom: 5px; display: block; }
        
        /* Inputs & Buttons */
        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        .btn { padding: 18px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; font-size: 16px; }
        .btn-ai { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99,102,241,0.4); }

        /* History Items */
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 10px; }
        
        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); }
        .nav-item { cursor: pointer; text-align: center; color: var(--text-sec); font-size: 12px; }
        .nav-item.active { color: var(--primary); font-weight: 700; }

        .fab { background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; position: fixed; bottom: 85px; left: 20px; box-shadow: 0 10px 25px rgba(99,102,241,0.4); border: none; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1 style="font-weight: 900; margin-bottom: 5px;">היי, מושון</h1>
        <p style="color: var(--text-sec); margin-bottom: 25px;">הנה מה שהבינה המלאכותית מצאה עבורך:</p>
        
        <div id="ai-container">
            <div class="ai-card">
                <span class="label" style="color: #a5b4fc;">תובנת AI ראשונה</span>
                <div id="ai-text">מנתח את הרגלי הצריכה שלך...</div>
            </div>
        </div>

        <div class="card">
            <span class="label">יתרה בתזרים חופשי</span>
            <div style="font-size: 42px; font-weight: 900; letter-spacing: -1px;" id="balanceDisplay">₪0</div>
        </div>

        <div class="card">
            <span class="label">תקציב חודשי: <span id="budgetStatus">0/0</span></span>
            <div style="height: 10px; background: #334155; border-radius: 5px; margin-top: 10px; overflow: hidden;">
                <div id="budgetBar" style="height: 100%; background: var(--primary); width: 0%; transition: 0.5s;"></div>
            </div>
        </div>
    </div>

    <div id="page-tx" class="page">
        <h2>היסטוריה וחיפוש</h2>
        <input type="text" id="searchInput" placeholder="חפש תנועה..." onkeyup="renderTx()">
        <div id="historyList"></div>
    </div>

    <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; padding: 20px;">
        <div class="card" style="width:100%;">
            <h3>הוסף פעולה</h3>
            <input type="number" id="amt" placeholder="סכום">
            <input type="text" id="note" placeholder="תיאור">
            <select id="type">
                <option value="out">הוצאה</option>
                <option value="in">הכנסה</option>
            </select>
            <button class="btn btn-ai" onclick="saveTx()">שמור במערכת</button>
            <button class="btn" style="color: var(--text-sec); margin-top: 10px;" onclick="closeModal()">ביטול</button>
        </div>
    </div>

    <button class="fab" onclick="openModal()">+</button>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('home', this)">🏠<br>ראשי</div>
        <div class="nav-item" onclick="nav('tx', this)">📜<br>תנועות</div>
        <div class="nav-item" onclick="alert('הגדרות בקרוב')">⚙️<br>הגדרות</div>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('FinanceAI')) || { txs: [], budget: 4000 };

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            el.classList.add('active');
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveTx() {
            const amt = parseFloat(document.getElementById('amt').value);
            const note = document.getElementById('note').value;
            if(!amt || !note) return;
            
            db.txs.push({
                id: Date.now(),
                amt, note,
                type: document.getElementById('type').value,
                date: new Date()
            });
            localStorage.setItem('FinanceAI', JSON.stringify(db));
            closeModal();
            refresh();
        }

        // --- מנוע ה-AI ---
        function runAI() {
            if(db.txs.length < 3) return "המשך להזין נתונים כדי שה-AI יוכל לנתח את ההרגלים שלך.";
            
            const expenses = db.txs.filter(t => t.type === 'out');
            const totalExp = expenses.reduce((s, t) => s + t.amt, 0);
            
            // 1. זיהוי יום עמוס
            const days = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
            const dayStats = [0,0,0,0,0,0,0];
            expenses.forEach(t => dayStats[new Date(t.date).getDay()] += t.amt);
            const peakDay = days[dayStats.indexOf(Math.max(...dayStats))];

            // 2. חיזוי סוף חודש
            const dayOfMonth = new Date().getDate();
            const forecast = (totalExp / dayOfMonth) * 30;

            // 3. תובנה חכמה
            let insight = `נראה שיום **${peakDay}** הוא היום "היקר" ביותר שלך בשבוע. <br><br>`;
            if(forecast > db.budget) {
                insight += `⚠️ **אזהרת תקציב:** בקצב הזה תסיים את החודש עם הוצאות של ₪${Math.round(forecast)}. כדאי לצמצם ₪${Math.round((forecast - db.budget)/ (31-dayOfMonth))} ליום.`;
            } else {
                insight += `✅ אתה עומד ביעדים! התחזית לסוף החודש היא ₪${Math.round(forecast)}.`;
            }
            return insight;
        }

        function refresh() {
            let balance = 0;
            let spent = 0;
            db.txs.forEach(t => {
                if(t.type === 'in') balance += t.amt;
                else { balance -= t.amt; spent += t.amt; }
            });

            document.getElementById('balanceDisplay').innerText = `₪${balance.toLocaleString()}`;
            document.getElementById('budgetStatus').innerText = `₪${spent} / ₪${db.budget}`;
            document.getElementById('budgetBar').style.width = Math.min((spent/db.budget)*100, 100) + '%';
            document.getElementById('ai-text').innerHTML = runAI();
            renderTx();
        }

        function renderTx() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const html = db.txs
                .filter(t => t.note.toLowerCase().includes(query))
                .sort((a,b) => b.id - a.id)
                .map(t => `
                    <div class="tx-item">
                        <div>
                            <div style="font-weight:700;">${t.note}</div>
                            <div style="font-size:12px; color:var(--text-sec);">${new Date(t.date).toLocaleDateString()}</div>
                        </div>
                        <div style="color: ${t.type === 'in' ? 'var(--success)' : 'var(--danger)'}; font-weight:900;">
                            ${t.type === 'in' ? '+' : '-'}₪${t.amt}
                        </div>
                    </div>
                `).join('');
            document.getElementById('historyList').innerHTML = html;
        }

        refresh();
    </script>
</body>
</html>
